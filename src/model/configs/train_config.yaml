# Cyrillic Font Generator — Training Configuration

# --- Data ---
data:
  fonts_dir: "data/fonts"
  image_size: 128                  # Glyph render resolution (pixels, square)
  num_style_glyphs: 10             # Number of Latin reference glyphs fed to StyleEncoder

  # Latin glyphs used as style reference (rendered from the input font).
  # These 10 were chosen for maximum structural diversity (ascenders, descenders,
  # curves, diagonals, enclosed counters).
  # MUST match tensor contract: uppercase only A, B, C, D, E, H, I, O, R, X
  style_latin_chars: ["A", "B", "C", "D", "E", "H", "I", "O", "R", "X"]

  # Russian Cyrillic target charset — 33 characters, indices 0–65.
  # Uppercase: index 0–32, Lowercase: index 33–65
  target_charset:
    uppercase: ["А","Б","В","Г","Д","Е","Ё","Ж","З","И","Й","К","Л","М","Н","О","П","Р","С","Т","У","Ф","Х","Ц","Ч","Ш","Щ","Ъ","Ы","Ь","Э","Ю","Я"]
    lowercase: ["а","б","в","г","д","е","ё","ж","з","и","й","к","л","м","н","о","п","р","с","т","у","ф","х","ц","ч","ш","щ","ъ","ы","ь","э","ю","я"]

# --- Model ---
model:
  style_embedding_dim: 256         # StyleEncoder output dimension
  char_embedding_dim: 64           # Learned character embedding dimension
  unet_base_filters: 32            # UNet channel width at first layer
  patch_discriminator_ndf: 64      # PatchGAN discriminator base filters

# --- Training ---
training:
  batch_size: 32                   # RTX 3070Ti Laptop (8GB VRAM): try 16–64; increase for higher GPU util, decrease on OOM
  epochs: 200
  lr_generator: 0.0002
  lr_discriminator: 0.0002
  beta1: 0.5                       # Adam beta1 (standard for GANs)
  beta2: 0.999                     # Adam beta2
  lambda_l1: 10                    # pix2pix L1 reconstruction loss weight (reduced from 100 to cut average-shape bias)
  lambda_fm: 10                    # discriminator feature-matching loss weight
  checkpoint_interval: 10          # Save checkpoint every N epochs
  log_interval: 100                # Log losses every N batches

# --- Output ---
output:
  model_output_dir: "models/"
  checkpoint_dir: "models/checkpoints/"
  sample_dir: "models/samples/"    # Generated sample images during training
